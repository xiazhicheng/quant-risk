code: "00268"
name: "金蝶国际"
industry: "互联网/IT"
data_source: "ai-berkshire industry-research SOP"
data_date: "2026-07-23"

# 第一步: 投资逻辑链
logic_chain:
  trend: "企业 SaaS 云转型 + 信创国产化替代 + AI 赋能 ERP"
  chain:
    - "传统 On-Premise ERP → 云化迁移（苍穹/星空）"
    - "大型企业 SaaS 替代外资（Oracle/SAP）"
    - "中小微云财务覆盖（金蝶精斗云）"
    - "毛利率67%高，但研发+销售费用吞噬一切 → 净利率仅1.1%"
  bottlenecks:
    - text: "净利率仅1.1%，毛利→净利转化极差，资本回报ROE 1.1%"
      severity: "high"
    - text: "SaaS获客成本持续上升，用友/钉钉/金山等竞争激烈"
      severity: "high"
    - text: "PE 246倍，市场为未来盈利定价但当前不赚钱"
      severity: "high"

