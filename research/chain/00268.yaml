# 第三步: 卡脖子环节 + 竞品对标
bottleneck: "🔴 净利率仅1.1%，SaaS获客成本高企 | 🔴 营收增长放缓，云化迁移进度不及预期 | 🔴 PE 246倍估值泡沫"
vs_leader: "vs 用友网络 — 营收-30pp | 净利率-5pp | 云订阅收入-40pp"

# 第四步: 生意特征
business_traits:
  - segment: "中游_SaaS平台"
    model: "订阅制（ARR）"
    gross_margin: "67.15%"
    moat_type: "客户粘性/转换成本"
  - segment: "下游_客户场景"
    model: "云化替代+信创"
    gross_margin: "—"
    moat_type: "政策壁垒"

# 第六步: 文明趋势
civilization:
  trend: "企业ERP从本地部署→云化→AI原生，长期确定性强，但金蝶云化转型进度落后于用友"
  disruptors:
    - "SaaS获客成本持续上升，净利率极薄导致持续烧钱"
    - "AI原生ERP（如AI Agent替代传统ERP）可能颠覆现有SaaS模式"
