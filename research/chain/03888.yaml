code: "03888"
name: "金山软件"
industry: "互联网/IT"
data_source: "ai-berkshire industry-research SOP"
data_date: "2026-07-22"

# 第一步: 投资逻辑链
logic_chain:
  trend: "AI赋能办公软件 + 政企信创替代 + 海外扩张"
  chain:
    - "WPS月活6.78亿现金牛 → 研发投入20.95亿(+23.57%)"
    - "WPS AI月活8013万(+307%) → AI替代手动编辑"
    - "游戏Q3同比-47% → 拖累整体利润"
    - "WPS 365连续4Q+60%但市占率<8% → '飞钉微'占92%市占率"
  bottlenecks:
    - text: "AI大模型依赖外部(OpenAI/国产)，核心技术自主性不足"
      severity: "high"
    - text: "协同办公'飞钉微'占92%市占率，WPS 365仅8%，政企市场被锁定"
      severity: "high"
    - text: "个人用户6.78亿月活天花板渐近"
      severity: "medium"

