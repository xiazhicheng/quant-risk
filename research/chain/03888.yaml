# 第三步: 卡脖子环节 + 竞品对标
bottleneck: "🔴 AI大模型依赖外部 | 🔴 协同办公'飞钉微'占92%市占率"
vs_leader: "转型关键: WPS从工具→平台转型，研发投入20.95亿(+23.57%)"

# 第四步: 生意特征
business_traits:
  - segment: "中游_软件平台"
    model: "订阅+广告+游戏"
    gross_margin: "79.85%"
    moat_type: "品牌/转换成本"
  - segment: "下游_用户场景"
    model: "个人+政企+海外"
    gross_margin: "—"
    moat_type: "信创壁垒"

# 第六步: 文明趋势
civilization:
  trend: "AI重塑办公效率，WPS AI月活+307%说明转型有效"
  disruptors:
